version: '3.8'
services:
  # 练习用MySQL
  mysql-practice:
    image: mysql:8.0
    container_name: mysql-practice
    ports:
      - "3307:3306"  # 用3307端口，和上线项目的3306区分
    environment:
      MYSQL_ROOT_PASSWORD: 123456  # 练习用密码，简单点没关系
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - ./mysql_data:/var/lib/mysql  # 挂载到当前目录的mysql_data
    restart: always
    networks:
      - practice-network

  # 练习用Redis
  redis-practice:
    image: redis:latest
    container_name: redis-practice
    ports:
      - "6380:6379"  # 用6380端口，和上线项目的6379区分
    volumes:
      - ./redis_data:/data
    command: redis-server --appendonly yes  # 开启持久化
    restart: always
    networks:
      - practice-network

networks:
  practice-network:
    driver: bridge